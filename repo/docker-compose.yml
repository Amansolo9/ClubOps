services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clubops_app
    ports:
      - "8080:8080"
    environment:
      - APP_ENCRYPTION_KEY=local-dev-encryption-key-please-change
      - APP_DB_PATH=/data/fullstack.db
      - APP_BOOTSTRAP_ADMIN_PASSWORD=ChangeMe12345!-replace-for-real-use
    volumes:
      - sqlite_data:/data
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped

volumes:
  sqlite_data:
